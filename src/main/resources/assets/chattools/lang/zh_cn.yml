modmenu.nameTranslation.chattools: Chat Tools [聊天工具箱]
modmenu.descriptionTranslation.chattools: 一个提供了许多容易上手的好用的聊天功能的工具箱
key:
  chattools:
    texts:
      config:
        reload: '§6[Chat Tools] 已从文件重新加载配置'
        get: '§6[Chat Tools] 读取到 "%s§6" 的值为 %s'
        set:
          .: '§a[Chat Tools] 已设置 "%s§a" 的值为 %s'
          warning: '§6[Chat Tools] 警告：键 "%s§6" 未被 Chat Tools 定义'
          unsupported: '§c[Chat Tools] 错误：不支持对键 "%s§c" 的修改'
          saved: '§a[Chat Tools] 已保存配置'
        toggle:
          error: '§c[Chat Tools] 错误：键 "%s§c" 未被 Chat Tools 定义'
      RestoreMessagesSplitLine: '§7==== 储存的聊天记录 ====§r'
      filterPlaceholder:
        .: '§7==== [已过滤] ====§r'
        '@Tooltip': '此消息被 Chat Tools 聊天过滤功能过滤'
      welcomeMessage: 第一次使用 Chat Tools？点击这里查看常见问题解答！
      toast.title: 来自 Minecraft 的关注信息
      actionbar.title: §a§l聊天栏中有您关注的信息
      CircuitBreaker:
        exceed:
          Toast: '§6[Chat Tools] 后台通知过载（请求速度超过每秒%s§6次），已自动禁用'
          NickHider: '§6[Chat Tools] 隐藏昵称过载（请求速度超过每秒%s§6次），已自动禁用'
          OverrideChatColor: '§6[Chat Tools] 覆盖聊天颜色样式过载（请求速度超过每秒%s§6次），已自动禁用'
      repeat:
        failure:
          empty: §6§l复读失败：不存在上一条消息
      download.process: '[Chat Tools] %s 下载进度：%s%% - （%sKB/%sKB）'
      download.success: '§6[Chat Tools] 已完成下载！'
      toast.failure: §6Toast 失败：附件未完整下载 或 模式不支持该平台§r
      respond.failure: '§6[Chat Tools] 试图自动响应失败：%s'
      translator:
        requireApi: '[请先配置翻译API]'
        await: '[正在响应……]'
        error: '[发生错误：%s]'
      copy:
        launch: 点击打开复制菜单。
        title: 复制菜单
        copyTextComponent: 复制文本组件（原始JSON文本）
        copyObjectData: 复制对象数据
        copyRaw: 复制源文本
        copyWithColorCodeEscaped: 复制颜色代码转义后文本
        copyWithNoColorCode: 复制去除颜色代码的文本
        copyUnixTimestamp: 复制 Unix 时间戳
        copyTimestamp: 复制时间戳文本
        jumpTo: 跳转
        cancel: 取消
      ChatHistoryNavigator:
        title: 聊天搜索
        placeholder: 输入以搜索…
        modes:
          CASE_INSENSITIVE:
            .: 大小写不敏感
            '@Tooltip': 不区分大小写
          CASE_SENSITIVE:
            .: 大小写敏感
            '@Tooltip': 区分大小写
          REGEX:
            .: 正则表达式
            '@Tooltip': 使用正则表达式
          SUBSCRIBED:
            .: 聊天提醒
            '@Tooltip': 被聊天提醒关注的消息
      PreviewClickEvents:
        overall: §6文本组件互动信息：
        insertion: §c- §rShift + 单击填入文字：%s
        clickEvent:
          .: §c- §r点击事件：
          openUrl: §c - §r打开网页链接：%s
          openFile: §c - §r打开文件：%s
          runCommand: §c - §r执行指令：%s
          suggestCommand: §c - §r填入文字：%s
          showDialog: §c - §r打开对话框：%s
          changePage: §c - §r翻页：%s
          copyToClipboard: §c - §r复制到剪切板：%s
          custom: §c - §r自定义网络数据包：%s
      'on': 启用 Chat Tools [聊天工具箱]
      'off': 禁用 Chat Tools [聊天工具箱]
      requireReload: 请在更改后输入 §6/chattools config reload§r 应用更改
      defaultValue: 默认：%s
      variableType: 类型：%s
    gui:
      title: 配置 Chat Tools [聊天工具箱]
    category:
      general: 通用
      notifier: 聊天提醒
      formatter: 注入聊天
      chatkeybindings: 快捷发言
      bubble: 聊天气泡
      responder: 自动响应
      filter: 聊天过滤
      customJoinMessage: 进服消息
      translator: 翻译器
    general:
      FAQ:
        .: '[常见问题解答]'
        '@Tooltip': 查看常见问题解答
      ChatTools:
        Enabled:
          .: 启用 Chat Tools [聊天工具箱]
          '@Tooltip': 切换整个模组的开关。
      CircuitBreaker:
        .: 熔断器
        '@Tooltip': 相关功能熔断阈值设置
        ToastThreshold:
          .: 后台通知 熔断阈值
          '@Tooltip': 当在一秒的时间窗口内接收到超过此阈值的后台通知请求时，后台通知会被禁用
        NickHiderThreshold:
          .: 隐藏昵称 熔断阈值
          '@Tooltip': 当在一秒的时间窗口内接收到超过此阈值的隐藏昵称处理请求时，隐藏昵称会被禁用
        OverrideChatColorThreshold:
          .: 覆盖聊天颜色样式 熔断阈值
          '@Tooltip': 当在一秒的时间窗口内接收到超过此阈值的覆盖聊天颜色样式请求时，覆盖聊天颜色样式会被禁用
      Timestamp:
        .: 时间戳
        '@Tooltip': 在消息前插入时间戳。
        Enabled:
          .: 启用时间戳
          '@Tooltip': 切换是否应插入时间戳。
        Pattern:
          .: 格式
          '@Tooltip': |-
            时间戳的格式。
            & -> 颜色代码前缀
            \& -> &
            {hour} -> 小时
            {minute} -> 分钟
            {second} -> 秒
        CopyToChatBar:
          Enabled:
            .: 启用复制菜单
            '@Tooltip': 启用复制之后，点击时间戳，可以打开复制菜单。
      RestoreMessages:
        .: 储存聊天记录
        '@Tooltip': 即使在切换到其他会话后也能恢复之前的会话。
        Enabled:
          .: 启用储存聊天记录
          '@Tooltip': 切换是否应恢复消息。
        SplitLineEnabled:
          .: 启用分割线
          '@Tooltip': 如果开启，切换会话时会在聊天中添加分割线。
      ExclusiveActionbar:
        .: 独占动作栏（Actionbar）
        '@Tooltip': Chat Tools [聊天工具箱] 的动作栏文本将不会以原版动作栏方式呈现，而是以独占的文本渲染。
        Enabled:
          .: 启用独占动作栏
          '@Tooltip': 切换是否独占渲染动作栏文本。
        XOffset:
          .: X轴偏移量
          '@Tooltip': 按指定的值移动独占动作栏的 X 坐标。
        YOffset:
          .: Y轴偏移量
          '@Tooltip': 按指定的值移动独占动作栏的 Y 坐标。
        Size:
          .: 大小
          '@Tooltip': 独占动作栏的文本大小。
      NickHider:
        .: 隐藏昵称§6（实验性功能）
        '@Tooltip': |-
          在客户端层面替换你的名字。
          
          §6实验性功能：请注意，如果消息无法被正常处理，将会显示原始文本
        Enabled:
          .: 启用昵称隐藏
          '@Tooltip': 切换是否应替换你的昵称。
        Nickname:
          .: 自定义昵称
          '@Tooltip': |-
            用于替换的新昵称。
            & -> 颜色代码前缀
            \& -> &
        CacheSize:
          .: 缓存数量上限
          '@Tooltip': 最多缓存的替换结果数量。
      ChatCompactor:
        .: 聊天压缩
        '@Tooltip': 压缩重复聊天使得聊天更紧凑。
        Enabled:
          .: 启用聊天压缩
          '@Tooltip': 切换是否压缩重复聊天。
        UseStrict:
          .: 启用严格模式
          '@Tooltip': 切换是否只有文本原始数据完全一致时才会被压缩。
        MaxOccurrence:
          .: 计数上限
          '@Tooltip': |-
            每次压缩信息时，会使消息的计数器自增1。
            若计数器超出此计数上限则不再自增。
      ChatHistoryNavigator:
        .: 聊天搜索
        '@Tooltip': 在聊天栏中按下 Ctrl + F 搜索聊天历史记录。
        Enabled:
          .: 启用聊天搜索
          '@Tooltip': 切换是否启用聊天搜索功能。
        ShowTimestampsEnabled:
          .: 启用时间戳显示
          '@Tooltip': 切换是否在搜索结果前添加时间戳。
      PreviewClickEvents:
        Enabled:
          .: 启用预览点击事件
          '@Tooltip': 预览聊天栏中文字的点击事件。
      MaxHistoryLength:
        .: 最大历史记录长度
        '@Tooltip': |-
          更改您的最大历史记录大小。
          （Minecraft 默认：100）
      IncreaseChatFieldMaxLength:
        .: 去除聊天栏最大字符数限制
        '@Tooltip': |-
          更改聊天栏的最大字符数限制。
          （Minecraft 默认：256）

          请注意如果聊天长度大于256，可能会导致不可预料的后果。
      HideChatHistoryInF1Mode:
        .: 在 F1 模式下打开聊天屏幕时隐藏聊天历史
        '@Tooltip': |-
          重新引入 MC-130244。
          §6（需要 Minecraft 版本≥1.20.5）§r
      OverrideChatColor:
        .: 覆盖聊天颜色样式§6（实验性功能）
        '@Tooltip': |-
          将聊天信息中的颜色信息变为白色。
          
          §6实验性功能：请注意，如果消息无法被正常处理，将会显示原始文本
          消息过多可能会处理不过来导致巨量卡顿！
        Enabled:
          .: 启用覆盖聊天颜色样式
          '@Tooltip': 切换是否启用覆盖聊天颜色样式。
      UseSendPacketsForSendingMessages:
        .: 通过发送数据包来执行命令或发送文字
        '@Tooltip': |-
          当它启用时，聊天工具箱的所有“发送消息”功能将直接发包到服务器
          当它禁用时，聊天工具箱的所有“发送消息”功能会模拟打开聊天栏发送文本
          §6（需要 Minecraft 版本≥1.19）§r
      DisableTextObfuscation:
        Enabled:
          .: 禁用文本混淆样式
          '@Tooltip': 切换是否禁用文本混淆样式渲染
    translator:
      .: 翻译器
      Enabled:
        .: 启用翻译器
        '@Tooltip': |-
          在聊天栏中输入一些文字，按下 Shift + Tab 进行翻译。
          切换是否启用翻译器。
      Mode:
        .: 模式
        '@Tooltip': |-
          §6BUILTIN§r: 使用自定义 API 请求翻译
          §6BAIDU§r: 使用百度翻译 API 进行翻译
          §6MICROSOFT_FREE§r: 模拟 Edge 调用微软翻译
          §6GOOGLE_FREE§r: 模拟 Google 网页翻译
      Builtin:
        .: 自定义翻译（BUILTIN）
        '@Tooltip': |-
          使用提供的 API 链接请求翻译。
          需要自行配置翻译 API。
        API:
          .: 翻译 API
          '@Tooltip': |-
            在这里输入一个链接，使用{text}替换待翻译的文字。
            如果没有{text}，将会把待翻译的文字添加到尾部。
        PostInstead:
          .: 以 POST 发送请求
          '@Tooltip': |-
            如果启用此项，将以 POST 发送请求，否则使用 GET。
            请注意在现版本即使以 POST 发送请求，实际上仍是把请求参数附在 URL 后面的，比较鸡肋。
      Baidu:
        .: 百度翻译（BAIDU）
        '@Tooltip': |-
          使用百度翻译 API 进行翻译。
          需要在自行在百度翻译开放平台注册。
        Appid:
          .: 应用 ID（appid）
          '@Tooltip': 您的应用 ID
        Appkey:
          .: 应用密钥（key）
          '@Tooltip': 您的应用密钥
        from:
          .: 源语言（from）
          '@Tooltip': 源语言，建议设置为 auto 以自动识别，请参阅百度翻译语种对照表
        to:
          .: 目标语言（to）
          '@Tooltip': 目标语言，例如英文为 en ，请参阅百度翻译语种对照表
      MicrosoftFree:
        .: 微软免费翻译（MICROSOFT_FREE）
        '@Tooltip': 模拟 Edge 浏览器调用的网页翻译进行翻译。
        from:
          .: 源语言（from）
          '@Tooltip': 源语言，建议留空以自动识别，请参阅微软翻译语种对照表
        to:
          .: 目标语言（to）
          '@Tooltip': 目标语言，例如英文为 en ，请参阅微软翻译语种对照表
      GoogleFree:
        .: Google 免费翻译（GOOGLE_FREE）
        '@Tooltip': |-
          模拟 Google 网页翻译进行翻译。
          可能会因为 Google 的反爬虫机制而偶尔失效。
        sl:
          .: 源语言（sl）
          '@Tooltip': 源语言，建议设置为 auto 以自动识别，请参阅 Google 翻译语种对照表
        tl:
          .: 目标语言（tl）
          '@Tooltip': 目标语言，例如英文为 en ，请参阅 Google 翻译语种对照表
    notifier:
      Toast:
        .: 后台通知
        '@Tooltip': |-
          当 Minecraft 在后台运行时推送 Toast 通知。
          只有匹配的消息才会计入。
        Enabled:
          .: 启用 Toast 通知
          '@Tooltip': 切换是否推送 Toast 通知。
        Mode:
          .: 模式
          '@Tooltip': |-
            §6ADDON§r: 通过触发额外的程序来推送 Toast 通知。 
                需要下载额外文件，请使用 §o/chattools download§r 手动下载。
            
            §6POWERSHELL§r: 通过 PowerShell 命令推送 Toast 通知

            §6AWT§r: 使用 Java AWT 库 推送 Toast 通知（通常没用，不建议使用。）
            
            §6TWO_SLICES§r: 使用 two-slices 库 推送 Toast 通知（可能在 Linux、Mac OS X 上有效）
      Sound:
        .: 声音
        '@Tooltip': |-
          播放声音效果。
          播放的声音效果将会被归类为“玩家”，可以通过“玩家”音量滑块调节。
          只有匹配的消息才会计入。
        Enabled:
          .: 启用声音
          '@Tooltip': 切换是否应播放声音效果。
        Type:
          .: 类型
          '@Tooltip': 将要播放的声音效果的标识符。
        Volume:
          .: 音量
          '@Tooltip': 更改声音的音量。
        Pitch:
          .: 音调
          '@Tooltip': 更改声音的音调。
        PlaySoundFromCameraPositionEnabled:
          .: 从相机位置播放音效
          '@Tooltip': |-
            启用前，播放的音效将位于玩家位置
            （也就是如果相机不在玩家位置则音量会根据距离衰减）。
            
            启用后，播放的音效将位于相机位置。
      Actionbar:
        .: 动作栏
        '@Tooltip': |-
          显示动作栏消息。
          只有匹配的消息才会计入。
        Enabled:
          .: 启用动作栏
          '@Tooltip': 切换是否应有动作栏通知。
      Highlight:
        .: 高亮
        '@Tooltip': |-
          在消息前插入前缀。
          只有匹配的消息才会计入。
        Enabled:
          .: 启用高亮
          '@Tooltip': 切换是否应在消息前插入前缀。
        Prefix:
          .: 前缀
          '@Tooltip': 将要插入的前缀。
        OverwriteEnabled:
          .: 覆写原聊天
          '@Tooltip': |-
            切换是否应覆写消息。 
            原文本的属性将会被擦除并覆写。
        InsertBeforeTimestamps:
          .: 插入到时间戳前
          '@Tooltip': 切换高亮文本应该插入在时间戳前方还是后方。
      IgnoreMyMessageEnabled:
        .: 忽略我自己的消息
        '@Tooltip': |-
          切换是否应从匹配中排除我自己的消息。
          在发送消息起 500ms 内接收到的消息都会被排除匹配。
      MatchMyNameEnabled:
        .: 匹配我的昵称
        '@Tooltip': |-
          切换是否应匹配我的昵称。
          你也可以通过在下面的匹配白名单中添加你的昵称来实现。
      AllowList:
        .: 匹配白名单
        '@Tooltip': |-
          此列表中的模式将用于匹配。
          建议使用正则表达式。
      BanList:
        .: 匹配黑名单
        '@Tooltip': |-
          此列表中的模式将会从匹配中排除。
          建议使用正则表达式。
    formatter:
      Enabled:
        .: 启用聊天注入
        '@Tooltip': |-
          聊天注入允许你根据自定义规则格式化消息（添加前后缀等）。
          切换是否应工作聊天注入。
      DisableThreshold:
        .: 自动禁用聊天注入阈值
        '@Tooltip': 如果注入后的聊天长度大于这个值，则自动禁用聊天注入。
      List:
        .: '规则 §6(当前会话标识符：%s§6)§r'
        '@Tooltip': |-
          定义聊天注入的规则。
          靠上的内容优先级更高。
        '@New': 新规则
        '@Display': §e[ %s§e ]§r %s
        Address:
          .: 会话标识符
          '@Tooltip': |-
            匹配此规则的会话标识符。
            建议使用正则表达式。
        Formatter:
          .: 文本
          '@Tooltip': |-
            格式化的模式串。
            {text} -> 原始文本
            <gradient> -> 渐变，参见常见问题解答
            其余支持变量或函数参见常见问题解答-函数对照表。
      DisableOnMatchList:
        .: 自动禁用聊天注入列表
        '@Tooltip': |-
          如果此列表中的任何模式串与你的文本匹配，
          我们将自动禁用该文本的聊天注入。
          建议使用正则表达式。
    chatkeybindings:
      RepeatKey:
        .: 一键复读
        '@Tooltip': |-
          §o人 类 的 本 质 是 __ __ __§r
          按下此键，将重复你的最后一条消息。
      RepeatKeyModifier:
        .: 复读键修饰符
        '@Tooltip': 你需要同时再按下此修饰键才能触发复读。
      ReviewLastMessageWithUpArrowOnly:
        .: 仅使用上箭头键查看上一条消息
        '@Tooltip': |-
          启用后，你可以通过按上箭头键查看你的上一条消息。
          禁用后，只有在聚焦聊天栏时，你才能通过按上箭头键查看你的上一条消息。
      Macro:
        Enabled:
          .: 启用宏
          '@Tooltip': 切换是否应工作以下宏。
        List:
          .: 宏
          '@Tooltip': 定义不同命令的快捷键。
          '@New': 新规则
          '@Display': §e[ %s§e ]§r %s
          Key:
            .: 宏按键
            '@Tooltip': 激活此宏的键。
          Modifier:
            .: 修饰键
            '@Tooltip': 你还需要同时激活此修饰键，以激活宏。
          Mode:
            .: 模式
            '@Tooltip': |-
              以修饰符为无、宏按键为“D”键做例子：
              §6LAZY§r: F3+D -> 无法激活
                Ctrl+D -> 无法激活

              §6GREEDY§r: F3+D -> 激活
                Ctrl+D -> 激活
          Command:
            .: 内容
            '@Tooltip': 激活此宏时将发送的内容。
    bubble:
      Enabled:
        .: 启用聊天气泡
        '@Tooltip': 切换是否应在说话者头上渲染气泡。
      Lifetime:
        .: 气泡持续时间
        '@Tooltip': 每个气泡的持续时间（以秒为单位）。
      YOffset:
        .: 气泡Y轴偏移量
        '@Tooltip': 气泡的Y轴偏移量。
      MaxLineWidth:
